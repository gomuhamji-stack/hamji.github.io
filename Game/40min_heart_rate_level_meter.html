<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heart Rate Monitor + Timer</title>
  <script src="webOSTV.js" charset="utf-8"></script>
  <style>
    body { 
      font-family: sans-serif; 
      padding: 20px; 
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      display: flex;
      gap: 40px;
      margin-top: 20px;
    }
    #heart-rate-container {
      width: 100px;
      height: 300px;
      background: #eee;
      border-radius: 5px;
      position: relative;
      overflow: hidden;
    }
    #heart-rate-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 0;
      background: lightgreen;
      transition: height 0.2s;
    }
    .debug { 
      margin-top: 20px; 
      background: #f0f0f0; 
      padding: 10px; 
      border-radius: 8px; 
      width: 300px;
    }
    .debug h3 { margin-top: 0; }
    .info { font-family: monospace; white-space: pre-wrap; }

    #timer-container {
      width: 100px;
      height: 300px;
      border: 2px solid #333;
      border-radius: 20px;
      position: relative;
      background: #f9f9f9;
    }
    #timer-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 0%;
      background: #4caf50;
      border-radius: 0 0 18px 18px;
      transition: height 1s linear;
    }
    #timer-text {
      margin-top: 10px;
      font-size: 1.2em;
      font-weight: bold;
      text-align: center;
    }
    #start-timer {
      margin-top: 10px;
      padding: 8px 16px;
      font-size: 1em;
      cursor: pointer;
    }
    #device-list {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 300px;
    }
    .device-btn {
      padding: 10px;
      background-color: #2196f3;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-align: left;
    }
    .device-btn:hover {
      background-color: #1976d2;
    }
  </style>
</head>
<body>
  <h1>Heart Rate Monitor + 40분 타이머</h1>
  <button id="connect-btn">주변 스마트 기기 스캔하기</button>  
  <div id="device-list"></div>
  
  <p>Heart Rate: <span id="heart-rate">--</span> bpm</p>
  
  <div class="container">
    <div id="heart-rate-container">
      <div id="heart-rate-fill"></div>
    </div>

    <div id="timer-container">
      <div id="timer-fill"></div>
    </div>
  </div>
  
  <div id="timer-text">40:00</div>
  <button id="start-timer">Start Timer</button>

  <div class="debug">
    <h3>Debug Info</h3>
    <div class="info" id="debug-log"></div>
  </div>

  <script>
    const connectButton = document.getElementById('connect-btn');
    const deviceListDiv = document.getElementById('device-list');
    const heartRateDisplay = document.getElementById('heart-rate');
    const debugLog = document.getElementById('debug-log');
    const heartRateFill = document.getElementById('heart-rate-fill');

    let connectedAddress = null;

    connectButton.addEventListener('click', () => {
      connectButton.textContent = "🔄 스캔 중...";
      deviceListDiv.innerHTML = "";
      
      // webOS 환경이 맞는지 검사
      if (!window.webOS) {
        debugLog.textContent += "❌ WebOS 환경이 아닙니다 (webOSTV.js 추가 및 앱 설치 필요).\n";
        alert("이 기능은 LG WebOS TV 앱 환경에서만 동작합니다.");
        connectButton.textContent = "주변 스마트 기기 스캔하기";
        return;
      }

      debugLog.textContent += "🔄 주변 BLE 기기 스캔 시작...\n";

      webOS.service.request("luna://com.webos.service.blegatt", {
        method: "client/startScan",
        parameters: { subscribe: true },
        onSuccess: function (inResponse) {
          if (inResponse.devices && inResponse.devices.length > 0) {
            renderDeviceList(inResponse.devices);
          }
        },
        onFailure: function (inError) {
          debugLog.textContent += `❌ 스캔 에러: ${JSON.stringify(inError)}\n`;
          connectButton.textContent = "주변 스마트 기기 스캔하기";
        }
      });
    });

    function renderDeviceList(devices) {
      deviceListDiv.innerHTML = ''; // 기존 리스트 갱신
      devices.forEach(device => {
        const name = device.name || '알 수 없는 기기';
        const address = device.address;
        const btn = document.createElement('button');
        btn.className = 'device-btn';
        btn.textContent = `${name} (${address})`;
        btn.onclick = () => connectToDevice(address, name);
        deviceListDiv.appendChild(btn);
      });
    }

    function connectToDevice(address, name) {
      connectedAddress = address;
      deviceListDiv.innerHTML = ''; // 선택 후 리스트 숨김
      connectButton.textContent = `${name} 연결 중...`;
      debugLog.textContent += `🔄 기기 연결 시도 중: ${address}\n`;

      webOS.service.request("luna://com.webos.service.blegatt", {
        method: "client/connect",
        parameters: { address: address, subscribe: true },
        onSuccess: function (inResponse) {
          // 1) 처음 연결 성공 상태 콜백 (event 객체가 없고 connected만 true로 떨어짐)
          if (inResponse.connected === true && typeof inResponse.event === 'undefined') {
            debugLog.textContent += `✅ 기기와 연결 성공!\n`;
            discoverServices(address);
          }
          
          // 2) 연결 유지 중 발생하는 알림 이벤트 콜백 (심박수 값 수신)
          if (inResponse.event === "onCharacteristicChanged") {
            handleHeartRateData(inResponse.value);
          }
        },
        onFailure: function (inError) {
          debugLog.textContent += `❌ 연결 에러: ${JSON.stringify(inError)}\n`;
          connectButton.textContent = "주변 스마트 기기 스캔하기";
        }
      });
    }

    function discoverServices(address) {
      webOS.service.request("luna://com.webos.service.blegatt", {
        method: "client/discoverServices",
        parameters: { address: address },
        onSuccess: function(response) {
          debugLog.textContent += `✅ 서비스 탐색 완료. 알림 설정 시도...\n`;
          enableHeartRateNotification(address);
        },
        onFailure: function (inError) {
          debugLog.textContent += `❌ 서비스 탐색 에러: ${JSON.stringify(inError)}\n`;
        }
      });
    }

    function enableHeartRateNotification(address) {
      webOS.service.request("luna://com.webos.service.blegatt", {
        method: "client/setCharacteristicNotification",
        parameters: {
          address: address,
          service: "0000180d-0000-1000-8000-00805f9b34fb", // Heart Rate Service 고유 UUID
          characteristic: "00002a37-0000-1000-8000-00805f9b34fb", // Heart Rate Measurement UUID
          enable: true
        },
        onSuccess: function(response) {
          connectButton.textContent = "데이터 실시간 측정 중";
          debugLog.textContent += `🚀 심박수 데이터 앱 알림 설정 완료!\n`;
        },
        onFailure: function(err) {
          debugLog.textContent += `❌ 알림 설정 에러: ${JSON.stringify(err)}\n`;
        }
      });
    }

    function handleHeartRateData(value) {
      if (!value) return;

      let bytes;
      if (typeof value === 'string') {
        // webOS 환경에서 base64 인코딩 된 값으로 넘어오는 경우 처리
        try {
          bytes = Uint8Array.from(atob(value), c => c.charCodeAt(0));
        } catch {
          return;
        }
      } else if (Array.isArray(value)) {
        // byte array인 경우
        bytes = new Uint8Array(value);
      } else {
        return;
      }

      const flags = bytes[0];
      let heartRate;
      
      // Heart Rate Measurement 표준 비트 파싱
      if (flags & 0x01) {
        heartRate = bytes[1] | (bytes[2] << 8); // 16bit HR
      } else {
        heartRate = bytes[1]; // 8bit HR
      }
      
      heartRateDisplay.textContent = `${heartRate}`;
      updateHeartRateBar(heartRate);
    }

    function updateHeartRateBar(heartRate) {
      const minHR = 50;
      const maxHR = 200;
      const percent = Math.max(0, Math.min(1, (heartRate - minHR) / (maxHR - minHR))) * 100;

      heartRateFill.style.height = `${percent}%`;

      if (heartRate <= 124) {
        heartRateFill.style.backgroundColor = 'lightgreen';
      } else if (heartRate >= 136) {
        heartRateFill.style.backgroundColor = 'red';
      } else {
        heartRateFill.style.backgroundColor = 'green';
      }
    }

    const timerFill = document.getElementById('timer-fill');
    const timerText = document.getElementById('timer-text');
    const startTimerButton = document.getElementById('start-timer');

    let timerInterval;

    startTimerButton.addEventListener('click', () => {
      clearInterval(timerInterval);

      const totalTime = 40 * 60;
      let remainingTime = totalTime;

      function updateTimer() {
        const elapsedPercent = 100 - (remainingTime / totalTime * 100);
        timerFill.style.height = `${elapsedPercent}%`;

        const minutes = Math.floor(remainingTime / 60);
        const seconds = remainingTime % 60;
        timerText.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

        if (remainingTime <= 0) {
          clearInterval(timerInterval);
        } else {
          remainingTime--;
        }
      }

      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    });
  </script>
</body>
</html>
